[profile.default]
libs = ["lib"]
solc = "0.8.19"
names = true
sizes = true
via_ir = true
optimizer = true
optimizer_runs = 999999
bytecode_hash = "none"
evm_version = "paris"

[profile.default.invariant]
runs = 1024
depth = 32
fail_on_revert = true

[profile.default.fmt]
wrap_comments = true

[lint]
exclude_lints = [
    "unaliased-plain-import",
    "asm-keccak256",
    "unwrapped-modifier-logic",
    "ast-src-not-found",
]
ignore = [
    'test/**/*.sol'
]

[profile.no_via_ir]
via-ir = false

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
